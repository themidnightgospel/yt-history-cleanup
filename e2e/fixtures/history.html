<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>History fixture</title>
  </head>
  <body>
    <script>
      window.ytcfg = {
        data_: {
          INNERTUBE_API_KEY: "FIXTURE_KEY",
          INNERTUBE_CONTEXT: { client: { clientName: "WEB", clientVersion: "2.99" } },
        },
      };
      window.ytInitialData = {
        items: [
          {
            feedbackToken: "FIXTURE_TOKEN_1",
            actions: [
              { hideItemSectionVideosByIdCommand: { videoId: "fixtureVid1" } },
            ],
          },
          {
            feedbackToken: "FIXTURE_TOKEN_SHORT",
            actions: [
              { hideItemSectionVideosByIdCommand: { videoId: "fixtureShort1" } },
            ],
          },
          {
            feedbackToken: "FIXTURE_TOKEN_SHELF_A",
            actions: [
              { hideItemSectionVideosByIdCommand: { videoId: "fixtureShelfA" } },
            ],
          },
          {
            feedbackToken: "FIXTURE_TOKEN_SHELF_B",
            actions: [
              { hideItemSectionVideosByIdCommand: { videoId: "fixtureShelfB" } },
            ],
          },
        ],
      };
      document.cookie = "SAPISID=fixtureSapisid; Path=/";
    </script>
    <script>
      window.ytInitialData.items.push({
        contentId: "fixtureVid1",
        onTap: {
          browseEndpoint: { browseId: "UCfixtureChannel11111111", canonicalBaseUrl: "/@fixturechan" },
        },
      });
    </script>
    <ytd-item-section-renderer>
      <div id="header">
        <ytd-item-section-header-renderer>
          <div id="header">
            <h2 id="title">Today</h2>
          </div>
        </ytd-item-section-header-renderer>
      </div>
      <yt-lockup-view-model id="row-1">
        <a href="https://www.youtube.com/watch?v=fixtureVid1">Fixture video 1</a>
        <div aria-label="Go to channel Fixture Channel" role="button"></div>
        <div class="ytContentMetadataViewModelMetadataRow">
          <span>Fixture Channel</span>
          <span> • </span>
          <span>10K views</span>
        </div>
      </yt-lockup-view-model>
    </ytd-item-section-renderer>
    <ytd-reel-shelf-renderer>
      <div id="contents">
        <ytm-shorts-lockup-view-model id="short-1" class="shortsLockupViewModelHost">
          <a href="/shorts/fixtureShort1">Fixture short 1</a>
        </ytm-shorts-lockup-view-model>
      </div>
    </ytd-reel-shelf-renderer>
    <ytd-reel-shelf-renderer id="shelf-bulk">
      <div id="header">
        <div id="menu">
          <button aria-label="More actions">⋯</button>
        </div>
      </div>
      <div id="right-arrow">
        <button aria-label="Next" aria-disabled="true">→</button>
      </div>
      <div id="contents">
        <ytm-shorts-lockup-view-model id="bulk-a" class="shortsLockupViewModelHost">
          <a href="/shorts/fixtureShelfA">A</a>
        </ytm-shorts-lockup-view-model>
        <ytm-shorts-lockup-view-model id="bulk-b" class="shortsLockupViewModelHost">
          <a href="/shorts/fixtureShelfB">B</a>
        </ytm-shorts-lockup-view-model>
      </div>
    </ytd-reel-shelf-renderer>
  </body>
</html>
